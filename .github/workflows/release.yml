name: Release

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

  build-android:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: NasMusic-${{ needs.check-version.outputs.version }}-android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    needs: check-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: NasMusic-${{ needs.check-version.outputs.version }}-windows
          path: build/windows/x64/runner/Release/

  build-linux:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: NasMusic-${{ needs.check-version.outputs.version }}-linux
          path: build/linux/x64/release/bundle/

  build-ios:
    needs: check-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: NasMusic-${{ needs.check-version.outputs.version }}-ios
          path: build/ios/iphoneos/

  build-macos:
    needs: check-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: NasMusic-${{ needs.check-version.outputs.version }}-macos
          path: build/macos/Build/Products/Release/

  build-web:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-artifact@v4
        with:
          name: NasMusic-${{ needs.check-version.outputs.version }}-web
          path: build/web/

  release:
    needs: [check-version, build-android, build-windows, build-linux, build-ios, build-macos, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: NasMusic-*
          merge-multiple: true
      - name: Prepare release assets
        shell: bash
        run: |
          ls -la
          # Rename APK for clarity
          mv app-release.apk NasMusic-android-${{ needs.check-version.outputs.version }}.apk 2>/dev/null || true
          # Zip bundle directories
          for dir in *.app linux macos ios windows web; do
            if [ -d "$dir" ]; then
              zip -r "NasMusic-${{ needs.check-version.outputs.version }}-${dir}.zip" "$dir"
              rm -rf "$dir"
            fi
          done
          ls -la
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: NasMusic ${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            *.apk
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
