name: Release

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Print version
        run: echo "Building NasMusic v${{ steps.version.outputs.version }}"

  build-android:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/NasMusic-${{ needs.check-version.outputs.version }}-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ needs.check-version.outputs.version }}
          path: release/

  build-windows:
    needs: check-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p release
          mv build/windows/x64/runner/Release "release/NasMusic-${{ needs.check-version.outputs.version }}-windows"
          cd release && zip -r "NasMusic-${{ needs.check-version.outputs.version }}-windows.zip" "NasMusic-${{ needs.check-version.outputs.version }}-windows" && rm -rf "NasMusic-${{ needs.check-version.outputs.version }}-windows"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ needs.check-version.outputs.version }}
          path: release/

  build-linux:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p release
          mv build/linux/x64/release/bundle "release/NasMusic-${{ needs.check-version.outputs.version }}-linux"
          cd release && zip -r "NasMusic-${{ needs.check-version.outputs.version }}-linux.zip" "NasMusic-${{ needs.check-version.outputs.version }}-linux" && rm -rf "NasMusic-${{ needs.check-version.outputs.version }}-linux"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ needs.check-version.outputs.version }}
          path: release/

  build-ios:
    needs: check-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p release
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "Found app at: $APP"
          cp -R "$APP" "release/NasMusic-${{ needs.check-version.outputs.version }}-ios.app"
          cd release && zip -r "NasMusic-${{ needs.check-version.outputs.version }}-ios.zip" "NasMusic-${{ needs.check-version.outputs.version }}-ios.app" && rm -rf "NasMusic-${{ needs.check-version.outputs.version }}-ios.app"
      - uses: actions/upload-artifact@v4
        with:
          name: ios-${{ needs.check-version.outputs.version }}
          path: release/

  build-macos:
    needs: check-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p release
          APP=$(find build/macos -name "Runner.app" -type d | head -1)
          echo "Found app at: $APP"
          cp -R "$APP" "release/NasMusic-${{ needs.check-version.outputs.version }}-macos.app"
          cd release && zip -r "NasMusic-${{ needs.check-version.outputs.version }}-macos.zip" "NasMusic-${{ needs.check-version.outputs.version }}-macos.app" && rm -rf "NasMusic-${{ needs.check-version.outputs.version }}-macos.app"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ needs.check-version.outputs.version }}
          path: release/

  build-web:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p release
          mv build/web "release/NasMusic-${{ needs.check-version.outputs.version }}-web"
          cd release && zip -r "NasMusic-${{ needs.check-version.outputs.version }}-web.zip" "NasMusic-${{ needs.check-version.outputs.version }}-web" && rm -rf "NasMusic-${{ needs.check-version.outputs.version }}-web"
      - uses: actions/upload-artifact@v4
        with:
          name: web-${{ needs.check-version.outputs.version }}
          path: release/

  release:
    needs: [check-version, build-android, build-windows, build-linux, build-ios, build-macos, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.check-version.outputs.version }}
          merge-multiple: true
      - name: List release assets
        shell: bash
        run: ls -la
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: NasMusic ${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: ./*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
